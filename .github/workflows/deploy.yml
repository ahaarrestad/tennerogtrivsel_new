name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [google_drive_update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  unit-tests:
    if: github.event_name != 'repository_dispatch' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run unit tests
        run: npm test

  lint:
    if: github.event_name != 'repository_dispatch' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run ESLint
        run: npm run lint

  e2e-tests:
    if: github.event_name != 'repository_dispatch' && github.event.pull_request.head.repo.fork != true
    runs-on: ubuntu-latest
    # E2E-bygget bruker syntetiske fixtures (ikke live Drive), så service-account-
    # secretene for sync trengs ikke her. De PUBLIC_*-variablene beholdes fordi
    # admin-siden baker dem inn ved `astro build`.
    env:
      PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
      PUBLIC_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      PUBLIC_GOOGLE_DRIVE_TJENESTER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TJENESTER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_MELDINGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_MELDINGER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_TANNLEGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TANNLEGER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_BILDER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_BILDER_FOLDER_ID }}
      PUBLIC_GOOGLE_API_KEY: ${{ secrets.PUBLIC_GOOGLE_API_KEY }}
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Verify npm package signatures
        run: npm audit signatures
      - name: Check for critical vulnerabilities
        run: npm audit --audit-level=critical

      # Seeder syntetiske fixtures i stedet for live Drive — gjør E2E uavhengig av
      # Google Drive-innhold. Dette bygget er KUN for testing og lastes IKKE opp som
      # deploy-artefakt (deploy-bygget skjer i build-jobben med ekte Drive-data).
      - name: Seed test fixtures
        run: npm run seed:fixtures

      - name: Build Astro site (fixtures)
        run: npm run build:ci

      # Fixtures-bygget gir samme inline-skript-hasher som prod-bygget (datadrevne
      # application/json-skript ekskluderes), så vi kan verifisere at den committede
      # src/generated/csp-hashes.json er i sync med kildekoden. Feiler hvis en utvikler
      # endret et inline-skript uten å regenerere og committe hash-fila.
      - name: Verify CSP hashes are in sync
        run: |
          # Playwright-imaget kjører som root mens checkout eier workspace som annen
          # UID — uten dette nekter git med «detected dubious ownership» (idempotent).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          npm run generate-csp-hashes
          git diff --exit-code src/generated/csp-hashes.json

      - name: Run E2E tests
        run: npx playwright test
        env:
          HOME: /root

  build:
    needs: [unit-tests, e2e-tests, lint]
    # Bygger deploy-artefakten. Hoppes over på pull_request (deploy skjer aldri på PR,
    # og fork-PR-er mangler Drive-secrets) — PR-er dekkes av unit/e2e/lint-jobbene.
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
      PUBLIC_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      PUBLIC_GOOGLE_DRIVE_TJENESTER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TJENESTER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_MELDINGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_MELDINGER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_TANNLEGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TANNLEGER_FOLDER_ID }}
      PUBLIC_GOOGLE_DRIVE_BILDER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_BILDER_FOLDER_ID }}
      PUBLIC_GOOGLE_API_KEY: ${{ secrets.PUBLIC_GOOGLE_API_KEY }}
    # Bygger ALLTID deploy-artefakten fra ekte Drive-data (`npm run sync`), for både
    # normal push og repository_dispatch. E2E-jobben bygger separat fra fixtures og
    # laster ikke opp noe — slik at det aldri er syntetiske testdata som deployes.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Verify npm package signatures
        run: npm audit signatures
      - name: Check for critical vulnerabilities
        run: npm audit --audit-level=critical
      - name: Sync data
        run: npm run sync
      - name: Build Astro site
        run: npm run build:ci
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: build-output
          path: dist/

  deploy:
    needs: build
    if: always() && needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: build-output
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

#      - name: Deploy to S3 TEST-SE
#        run: |
#          # 1. Hashed assets — immutable (1 år)
#          aws s3 sync dist/_astro/ s3://test2.aarrestad.com-se/_astro/ --delete \
#            --cache-control "public, max-age=31536000, immutable"
#
#          # 2. Fonter — immutable (1 år, versjonert i filnavn)
#          aws s3 sync dist/fonts/ s3://test2.aarrestad.com-se/fonts/ \
#            --cache-control "public, max-age=31536000, immutable"
#
#          # 3. Alt annet (HTML, favicons, SW) — kort cache med revalidering
#          aws s3 sync dist/ s3://test2.aarrestad.com-se --delete \
#            --exclude "_astro/*" --exclude "fonts/*" \
#            --cache-control "public, max-age=3600, stale-while-revalidate=86400"
#
#      - name: Invalidate CloudFront cache TEST
#        run: |
#          aws cloudfront create-invalidation \
#            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_TEST }} \
#            --paths "/*"

      - name: Create IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY not set — skipping"
            exit 0
          fi
          if ! [[ "$INDEXNOW_KEY" =~ ^[a-f0-9]{32}$ ]]; then
            echo "INDEXNOW_KEY is not valid 32-char hex — skipping"
            exit 0
          fi
          echo -n "$INDEXNOW_KEY" > "dist/${INDEXNOW_KEY}.txt"

      - name: Generate CSP hashes from build output
        run: node scripts/generate-csp-hashes.mjs

      - name: Deploy to S3 PROD-SE
        run: |
          # 1. Hashed assets — immutable (1 år)
          aws s3 sync dist/_astro/ s3://tennerogtrivsel-se/_astro/ --delete \
            --cache-control "public, max-age=31536000, immutable"

          # 2. Fonter — immutable (1 år, versjonert i filnavn)
          aws s3 sync dist/fonts/ s3://tennerogtrivsel-se/fonts/ \
            --cache-control "public, max-age=31536000, immutable"

          # 3. Alt annet (HTML, favicons, SW) — kort cache med revalidering
          aws s3 sync dist/ s3://tennerogtrivsel-se --delete \
            --exclude "_astro/*" --exclude "fonts/*" \
            --cache-control "public, max-age=3600, stale-while-revalidate=86400"

      - name: Invalidate CloudFront cache PROD
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"

      - name: Notify IndexNow
        continue-on-error: true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "INDEXNOW_KEY not set — skipping"
            exit 0
          fi
          if ! [[ "$INDEXNOW_KEY" =~ ^[a-f0-9]{32}$ ]]; then
            echo "INDEXNOW_KEY is not valid 32-char hex — skipping"
            exit 0
          fi

          if [ ! -f dist/sitemap-0.xml ]; then
            echo "dist/sitemap-0.xml not found — skipping IndexNow"
            exit 0
          fi

          URLS=$(grep -oP '(?<=<loc>)[^<]+' dist/sitemap-0.xml | jq -R . | jq -s .) || { echo "URL extraction failed — skipping IndexNow"; exit 0; }

          if [ -z "$URLS" ] || [ "$URLS" = "[]" ]; then
            echo "No URLs found in sitemap — skipping IndexNow"
            exit 0
          fi

          URL_COUNT=$(echo "$URLS" | jq 'length')
          if [ "$URL_COUNT" -gt 10000 ]; then
            echo "URL count ($URL_COUNT) exceeds IndexNow limit of 10000 — sending first 10000"
            URLS=$(echo "$URLS" | jq '.[0:10000]')
          fi

          PAYLOAD=$(jq -n \
            --arg host "www.tennerogtrivsel.no" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "https://www.tennerogtrivsel.no/${INDEXNOW_KEY}.txt" \
            --argjson urlList "$URLS" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          curl -Sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: Update CloudFront CSP hashes
        run: node scripts/update-cloudfront-csp.mjs
        env:
          CLOUDFRONT_POLICY_ID: ${{ secrets.CLOUDFRONT_CSP_POLICY_ID }}

      - name: Deploy CloudFront Functions
        run: node scripts/setup-cloudfront-functions.mjs

  update-lambda:
    needs: build
    if: always() && needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
      PUBLIC_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Verify npm package signatures
        run: npm audit signatures
      - name: Check for critical vulnerabilities
        run: npm audit --audit-level=critical

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy Lambda code
        working-directory: lambda/kontakt-form-handler
        run: |
          npm ci --omit=dev --ignore-scripts
          zip -r function.zip index.mjs node_modules/
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_KONTAKT_ARN }} \
            --zip-file fileb://function.zip \
            --region eu-north-1
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_KONTAKT_ARN }} \
            --region eu-north-1

      - name: Read kontaktEpost from Sheets
        id: kontakt-epost
        run: |
          EPOST=$(node scripts/read-kontakt-epost.mjs)
          echo "::add-mask::$EPOST"
          echo "value=$EPOST" >> $GITHUB_OUTPUT

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_KONTAKT_ARN }} \
            --environment "Variables={KONTAKT_MOTTAKER_EPOST=${{ steps.kontakt-epost.outputs.value }},ORIGIN_VERIFY_SECRET=${{ secrets.ORIGIN_VERIFY_SECRET }},RATE_LIMIT_TABLE=kontakt-rate-limit,AWS_NODEJS_CONNECTION_REUSE_ENABLED=1}" \
            --region eu-north-1

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_KONTAKT_ARN }} \
            --region eu-north-1
