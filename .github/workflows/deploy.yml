name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [google_drive_update]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
  GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
  PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.PUBLIC_GOOGLE_CLIENT_ID }}
  PUBLIC_GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  PUBLIC_GOOGLE_DRIVE_TJENESTER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TJENESTER_FOLDER_ID }}
  PUBLIC_GOOGLE_DRIVE_MELDINGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_MELDINGER_FOLDER_ID }}
  PUBLIC_GOOGLE_DRIVE_TANNLEGER_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_TANNLEGER_FOLDER_ID }}
  PUBLIC_GOOGLE_API_KEY: ${{ secrets.PUBLIC_GOOGLE_API_KEY }}

jobs:
  unit-tests:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Security audit
        run: npm audit --audit-level=high

  e2e-tests:
    if: github.event_name != 'repository_dispatch'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Sync data
        run: npm run sync

      - name: Run E2E tests
        run: npx playwright test
        env:
          HOME: /root

      - name: Build Astro site
        run: npm run build:ci

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  build:
    needs: [unit-tests, e2e-tests]
    if: |
      always() &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      # For repository_dispatch: full build (tests skipped)
      - uses: actions/checkout@v4
        if: github.event_name == 'repository_dispatch'
      - uses: actions/setup-node@v4
        if: github.event_name == 'repository_dispatch'
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        if: github.event_name == 'repository_dispatch'
      - name: Sync data
        if: github.event_name == 'repository_dispatch'
        run: npm run sync
      - name: Build Astro site
        if: github.event_name == 'repository_dispatch'
        run: npm run build:ci
      - name: Upload build artifact
        if: github.event_name == 'repository_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
      # For normal flow: build already done in e2e-tests job
      - name: Build completed in E2E job
        if: github.event_name != 'repository_dispatch'
        run: echo "Build artifact uploaded by e2e-tests job"

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Deploy to S3
        run: |
          # Synk alt med standard caching (immutable assets håndteres av Astro-hashing)
          aws s3 sync dist/ s3://test2.aarrestad.com --acl public-read --delete

          # Sett no-cache på API JSON-filer — disse MÅ hentes fersk hver gang
          # fordi klienten filtrerer meldinger etter dato ved runtime
          aws s3 cp s3://test2.aarrestad.com/api/ s3://test2.aarrestad.com/api/ \
            --recursive --acl public-read \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE
