name: Auto-Rebase Open PRs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Rebase open PRs
        run: |
          prs=$(gh pr list --state open --json number,headRefName,author --jq '.[]')
          echo "$prs" | jq -c '.' | while read -r pr; do
            number=$(echo "$pr" | jq -r '.number')
            author=$(echo "$pr" | jq -r '.author.login')

            if [ "$author" = "dependabot[bot]" ]; then
              echo "PR #$number (dependabot): commenting @dependabot rebase"
              gh pr comment "$number" --body "@dependabot rebase"
            else
              echo "PR #$number: updating branch via API"
              gh api "repos/$GH_REPO/pulls/$number/update-branch" \
                --method PUT --field update_method=rebase 2>/dev/null || \
                echo "  Skipped (already up to date or conflict)"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
          GH_REPO: ${{ github.repository }}
