name: Auto PR

on:
  push:
    branches: ['review/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR
        id: create-pr
        run: |
          EXISTING=$(gh pr list --head "$GITHUB_REF_NAME" --json url --jq '.[0].url' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: $EXISTING"
            echo "pr_url=$EXISTING" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_URL=$(gh pr create --base main --head "$GITHUB_REF_NAME" \
            --title "$(git log -1 --format=%s)" \
            --body "Auto-generated from \`git review\`.")
          echo "Created PR: $PR_URL"
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_url && github.actor == 'ahaarrestad'
        run: |
          gh pr merge --auto --rebase "${{ steps.create-pr.outputs.pr_url }}"
          echo "Auto-merge enabled"
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_PAT }}
