name: Scheduled Security Audit

on:
  schedule:
    - cron: '0 6 * * 1' # mandag 06:00 UTC
  workflow_dispatch: # manuell dispatch for testing

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies (root)
        run: npm ci

      - name: npm audit (root) — høy og kritisk
        run: npm audit --audit-level=high

      - name: Install dependencies (lambda)
        run: npm ci
        working-directory: lambda/kontakt-form-handler

      - name: npm audit (lambda) — høy og kritisk
        run: npm audit --audit-level=high
        working-directory: lambda/kontakt-form-handler

  osv-scan:
    name: OSV Scanner
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    permissions:
      security-events: write
      contents: read
      actions: read
    with:
      scan-args: |-
        -r
        ./
